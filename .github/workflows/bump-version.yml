name: Version Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install semantic-release
        run: uv tool install "python-semantic-release>=10.0.0,<11"

      # ── lactationcurve ───────────────────────────────────────────────────────
      - name: Determine version bump (lactationcurve)
        id: check-lactationcurve
        run: |
          OUTPUT=$(semantic-release --config packages/models/lactationcurve/pyproject.toml --noop version --print 2>&1)
          if echo "$OUTPUT" | grep -q "No release will be made"; then
            echo "::warning::No release triggered for lactationcurve."
            echo "  - No commits with feat:/fix: prefixes touching packages/models/lactationcurve/"
            echo "Full output: $OUTPUT"
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version, tag, and create GitHub Release (lactationcurve)
        if: steps.check-lactationcurve.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: semantic-release --config packages/models/lactationcurve/pyproject.toml version --no-changelog --vcs-release --push
