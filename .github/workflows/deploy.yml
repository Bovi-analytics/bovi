name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "apps/backend/**"
      - "apps/infrastructure/**"
      - "packages/infrastructure/**"
      - "packages/models/lactationcurve/src/**"
      - "packages/models/lactation-autoencoder/src/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.12"
  PULUMI_STACK: dev
  INFRA_DIR: apps/infrastructure
  AZURE_RESOURCE_GROUP: Bovi-Analytics-Tools

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      api: ${{ steps.filter.outputs.api }}
      functions: ${{ steps.filter.outputs.functions }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - "apps/infrastructure/**"
              - "packages/infrastructure/**"
            api:
              - "apps/backend/api/**"
            functions:
              - "apps/backend/models/**"
              - "packages/models/lactationcurve/src/**"
              - "packages/models/lactation-autoencoder/src/**"

  build-api-image:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set API image name
        id: image
        run: |
          name="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/bovi-api"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "sha=${name}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: apps/backend/api
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  infra:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.infra == 'true' ||
      needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install infrastructure dependencies
        working-directory: ${{ env.INFRA_DIR }}
        run: uv sync

      - name: Resolve current API image
        id: current-api-image
        run: |
          default_image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/bovi-api:latest"
          image="$(az containerapp show \
            --name "bovi-api-${{ env.PULUMI_STACK }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "properties.template.containers[0].image" -o tsv 2>/dev/null || true)"
          if [ -z "$image" ]; then
            image="$default_image"
          fi
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Pulumi up infrastructure
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ env.PULUMI_STACK }}
          work-dir: ${{ env.INFRA_DIR }}
          cloud-url: azblob://pulumi-state
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          API_IMAGE: ${{ steps.current-api-image.outputs.image }}

  migrate-api:
    needs: [detect-changes, build-api-image, infra]
    if: |
      always() &&
      needs.detect-changes.outputs.api == 'true' &&
      needs.build-api-image.result == 'success' &&
      needs.infra.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run API migrations
        env:
          API_IMAGE: ${{ needs.build-api-image.outputs.image }}
          API_MIGRATION_JOB: bovi-api-migrate-${{ env.PULUMI_STACK }}
        run: |
          execution_name="$(az containerapp job start \
            --name "$API_MIGRATION_JOB" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --image "$API_IMAGE" \
            --command run-migrations \
            --query "name" -o tsv)"
          if [ -z "$execution_name" ]; then
            execution_name="$(az containerapp job execution list \
              --name "$API_MIGRATION_JOB" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --query "[-1].name" -o tsv)"
          fi
          if [ -z "$execution_name" ]; then
            echo "Could not determine Container Apps Job execution name"
            exit 1
          fi
          echo "Started migration execution: $execution_name"

          deadline=$((SECONDS + 600))
          while [ "$SECONDS" -lt "$deadline" ]; do
            status="$(az containerapp job execution show \
              --name "$API_MIGRATION_JOB" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --job-execution-name "$execution_name" \
              --query "properties.status" -o tsv 2>/dev/null || true)"
            echo "Migration status: $status"
            case "$status" in
              Succeeded)
                exit 0
                ;;
              Failed|Canceled)
                exit 1
                ;;
            esac
            sleep 10
          done

          echo "Migration job timed out"
          exit 1

  rollout-api:
    needs: [detect-changes, build-api-image, migrate-api]
    if: |
      always() &&
      needs.detect-changes.outputs.api == 'true' &&
      needs.build-api-image.result == 'success' &&
      needs.migrate-api.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install infrastructure dependencies
        working-directory: ${{ env.INFRA_DIR }}
        run: uv sync

      - name: Pulumi up API image
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ env.PULUMI_STACK }}
          work-dir: ${{ env.INFRA_DIR }}
          cloud-url: azblob://pulumi-state
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          API_IMAGE: ${{ needs.build-api-image.outputs.image }}

      - name: Check API health
        run: |
          fqdn="$(az containerapp show \
            --name "bovi-api-${{ env.PULUMI_STACK }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)"
          health_url="https://${fqdn}/health"
          echo "Checking API health at ${health_url}"
          for attempt in $(seq 1 30); do
            echo "Health check attempt ${attempt}/30"
            if curl --connect-timeout 5 --max-time 10 -fsS "$health_url"; then
              exit 0
            fi
            sleep 10
          done
          az containerapp revision list \
            --name "bovi-api-${{ env.PULUMI_STACK }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "[].{name:name,active:properties.active,health:properties.healthState,image:properties.template.containers[0].image}" \
            -o table
          exit 1

  deploy-functions:
    needs: [detect-changes, infra, rollout-api]
    if: |
      always() &&
      needs.detect-changes.outputs.functions == 'true' &&
      (needs.infra.result == 'skipped' || needs.infra.result == 'success') &&
      (needs.detect-changes.outputs.api != 'true' || needs.rollout-api.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Functions Core Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y azure-functions-core-tools-4

      - name: Build lactationcurve wheel
        working-directory: packages/models/lactationcurve
        run: uv build

      - name: Generate requirements.txt for lactation-curves
        working-directory: apps/backend/models/lactation-curves
        run: uv export --no-dev --no-emit-workspace --no-hashes -o requirements.txt

      - name: Deploy lactation-curves
        working-directory: apps/backend/models/lactation-curves
        run: func azure functionapp publish "curves-${{ env.PULUMI_STACK }}" --python

      - name: Generate requirements.txt for lactation-autoencoder
        working-directory: apps/backend/models/lactation-autoencoder
        run: uv export --no-dev --no-emit-workspace --no-hashes -o requirements.txt

      - name: Deploy lactation-autoencoder
        working-directory: apps/backend/models/lactation-autoencoder
        run: func azure functionapp publish "autoencoder-${{ env.PULUMI_STACK }}" --python
