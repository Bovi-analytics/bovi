name: Deploy

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "apps/backend/**"
      - "apps/frontend/dashboard/**"
      - "apps/infrastructure/**"
      - ".github/actions/**"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "packages/bovi-core/src/**"
      - "packages/bovi-core/pyproject.toml"
      - "packages/infrastructure/**"
      - "packages/models/lactationcurve/src/**"
      - "packages/models/lactationcurve/pyproject.toml"
      - "packages/models/lactation-autoencoder/src/**"
      - "packages/models/lactation-autoencoder/pyproject.toml"
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: autoencoder
        type: choice
        options:
          - autoencoder
          - curves
          - api
          - dashboard
          - infra
          - all
      environment:
        description: Deployment environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.12"
  INFRA_DIR: apps/infrastructure
  AZURE_RESOURCE_GROUP: Bovi-Analytics-Tools
  AUTOENCODER_MODEL_VERSION: v15

jobs:
  resolve-deployment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      pulumi-stack: ${{ steps.resolve.outputs.pulumi-stack }}
      image-tag: ${{ steps.resolve.outputs.image-tag }}
    steps:
      - id: resolve
        shell: bash
        env:
          DISPATCH_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || '' }}
        run: |
          set -euo pipefail
          environment="${DISPATCH_ENVIRONMENT}"
          if [[ -z "$environment" ]]; then
            case "$GITHUB_REF_NAME" in
              main) environment="prod" ;;
              dev) environment="dev" ;;
              *) environment="dev" ;;
            esac
          fi

          {
            echo "environment=${environment}"
            echo "pulumi-stack=${environment}"
            echo "image-tag=${environment}-latest"
          } >> "$GITHUB_OUTPUT"

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      api: ${{ steps.filter.outputs.api }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      functions_curves: ${{ steps.filter.outputs.functions_curves }}
      functions_autoencoder: ${{ steps.filter.outputs.functions_autoencoder }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - "apps/infrastructure/**"
              - "packages/infrastructure/**"
              - ".github/actions/setup-python-uv/**"
              - ".github/actions/azure-login/**"
              - ".github/actions/install-infra-dependencies/**"
              - ".github/actions/resolve-current-image/**"
              - ".github/actions/pulumi-up/**"
            api:
              - "apps/backend/api/**"
              - ".github/actions/docker-build-push/**"
              - ".github/actions/setup-python-uv/**"
              - ".github/actions/azure-login/**"
              - ".github/actions/install-infra-dependencies/**"
              - ".github/actions/resolve-current-image/**"
              - ".github/actions/pulumi-up/**"
              - ".github/actions/run-api-migrations/**"
              - ".github/actions/check-containerapp-health/**"
            dashboard:
              - "apps/frontend/dashboard/**"
              - "docker-compose.yml"
              - ".github/actions/docker-build-push/**"
              - ".github/actions/setup-python-uv/**"
              - ".github/actions/azure-login/**"
              - ".github/actions/install-infra-dependencies/**"
              - ".github/actions/resolve-current-image/**"
              - ".github/actions/pulumi-up/**"
              - ".github/actions/check-containerapp-health/**"
            functions_curves:
              - "apps/backend/models/lactation-curves/**"
              - "pyproject.toml"
              - "uv.lock"
              - "packages/bovi-core/src/**"
              - "packages/bovi-core/pyproject.toml"
              - "packages/models/lactationcurve/src/**"
              - "packages/models/lactationcurve/pyproject.toml"
              - ".github/actions/setup-python-uv/**"
              - ".github/actions/azure-login/**"
              - ".github/actions/install-functions-core-tools/**"
              - ".github/actions/build-function-wheels/**"
              - ".github/actions/prepare-curves-function-package/**"
              - ".github/actions/deploy-function-app/**"
              - ".github/actions/check-function-triggers/**"
              - ".github/actions/smoke-curves-fit/**"
            functions_autoencoder:
              - "apps/backend/models/lactation-autoencoder/**"
              - "pyproject.toml"
              - "uv.lock"
              - "packages/bovi-core/src/**"
              - "packages/bovi-core/pyproject.toml"
              - "packages/models/lactation-autoencoder/src/**"
              - "packages/models/lactation-autoencoder/pyproject.toml"
              - ".github/actions/setup-python-uv/**"
              - ".github/actions/azure-login/**"
              - ".github/actions/install-functions-core-tools/**"
              - ".github/actions/build-function-wheels/**"
              - ".github/actions/prepare-autoencoder-function-package/**"
              - ".github/actions/sync-autoencoder-assets/**"
              - ".github/actions/deploy-function-app/**"
              - ".github/actions/check-function-triggers/**"
              - ".github/actions/smoke-function-health/**"

  build-api-image:
    needs: [resolve-deployment, detect-changes]
    if: |
      needs.detect-changes.outputs.api == 'true' ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'api' || inputs.target == 'all'))
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - id: build
        uses: ./.github/actions/docker-build-push
        with:
          image-name: bovi-api
          context: .
          file: apps/backend/api/Dockerfile
          github-token: ${{ secrets.GITHUB_TOKEN }}
          extra-tags: |
            ${{ needs.resolve-deployment.outputs.image-tag }}

  build-dashboard-image:
    needs: [resolve-deployment, detect-changes]
    if: |
      needs.detect-changes.outputs.dashboard == 'true' ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'dashboard' || inputs.target == 'all'))
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - id: build
        uses: ./.github/actions/docker-build-push
        with:
          image-name: bovi-dashboard
          context: apps/frontend/dashboard
          github-token: ${{ secrets.GITHUB_TOKEN }}
          extra-tags: |
            ${{ needs.resolve-deployment.outputs.image-tag }}

  infra:
    needs: [resolve-deployment, detect-changes, build-api-image, build-dashboard-image]
    if: |
      always() &&
      (
        needs.detect-changes.outputs.infra == 'true' ||
        needs.detect-changes.outputs.api == 'true' ||
        needs.detect-changes.outputs.dashboard == 'true' ||
        (github.event_name == 'workflow_dispatch' && (inputs.target == 'infra' || inputs.target == 'api' || inputs.target == 'dashboard' || inputs.target == 'all'))
      ) &&
      (needs.detect-changes.outputs.api != 'true' || needs.build-api-image.result == 'success') &&
      (needs.detect-changes.outputs.dashboard != 'true' || needs.build-dashboard-image.result == 'success') &&
      (!(github.event_name == 'workflow_dispatch' && (inputs.target == 'api' || inputs.target == 'all')) || needs.build-api-image.result == 'success') &&
      (!(github.event_name == 'workflow_dispatch' && (inputs.target == 'dashboard' || inputs.target == 'all')) || needs.build-dashboard-image.result == 'success')
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-deployment.outputs.environment }}
    env:
      PULUMI_STACK: ${{ needs.resolve-deployment.outputs.pulumi-stack }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/install-infra-dependencies
        with:
          infra-dir: ${{ env.INFRA_DIR }}

      - name: Set default image names
        id: defaults
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "api=ghcr.io/${owner}/bovi-api:${{ needs.resolve-deployment.outputs.image-tag }}" >> "$GITHUB_OUTPUT"
          echo "dashboard=ghcr.io/${owner}/bovi-dashboard:${{ needs.resolve-deployment.outputs.image-tag }}" >> "$GITHUB_OUTPUT"

      - id: current-api-image
        uses: ./.github/actions/resolve-current-image
        with:
          containerapp-name: bovi-api-${{ env.PULUMI_STACK }}
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          default-image: ${{ steps.defaults.outputs.api }}

      - id: current-dashboard-image
        uses: ./.github/actions/resolve-current-image
        with:
          containerapp-name: bovi-dashboard-${{ env.PULUMI_STACK }}
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          default-image: ${{ steps.defaults.outputs.dashboard }}

      - uses: ./.github/actions/pulumi-up
        with:
          stack-name: ${{ env.PULUMI_STACK }}
          work-dir: ${{ env.INFRA_DIR }}
          cloud-url: azblob://pulumi-state
          pulumi-config-passphrase: ${{ secrets.PULUMI_PASSPHRASE }}
          azure-storage-account-state: ${{ secrets.AZURE_STORAGE_ACCOUNT_STATE }}
          azure-storage-key: ${{ secrets.AZURE_STORAGE_KEY }}
          storage-account-name-icar: ${{ secrets.STORAGE_ACCOUNT_NAME_ICAR }}
          storage-account-key-icar: ${{ secrets.STORAGE_ACCOUNT_KEY_ICAR }}
          storage-account-container-icar: ${{ secrets.STORAGE_ACCOUNT_CONTAINER_ICAR }}
          ghcr-username: ${{ secrets.GHCR_USERNAME }}
          ghcr-token: ${{ secrets.GHCR_TOKEN }}
          autoencoder-model-version: ${{ env.AUTOENCODER_MODEL_VERSION }}
          api-image: ${{ needs.build-api-image.result == 'success' && needs.build-api-image.outputs.image || steps.current-api-image.outputs.image }}
          dashboard-image: ${{ needs.build-dashboard-image.result == 'success' && needs.build-dashboard-image.outputs.image || steps.current-dashboard-image.outputs.image }}

  migrate-api:
    needs: [resolve-deployment, detect-changes, build-api-image, infra]
    if: |
      always() &&
      (
        needs.detect-changes.outputs.api == 'true' ||
        (github.event_name == 'workflow_dispatch' && (inputs.target == 'api' || inputs.target == 'all'))
      ) &&
      needs.build-api-image.result == 'success' &&
      needs.infra.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-deployment.outputs.environment }}
    env:
      PULUMI_STACK: ${{ needs.resolve-deployment.outputs.pulumi-stack }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/run-api-migrations
        with:
          api-image: ${{ needs.build-api-image.outputs.image }}
          migration-job: bovi-api-migrate-${{ env.PULUMI_STACK }}
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  rollout-api:
    needs: [resolve-deployment, detect-changes, build-api-image, migrate-api]
    if: |
      always() &&
      (
        needs.detect-changes.outputs.api == 'true' ||
        (github.event_name == 'workflow_dispatch' && (inputs.target == 'api' || inputs.target == 'all'))
      ) &&
      needs.build-api-image.result == 'success' &&
      needs.migrate-api.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-deployment.outputs.environment }}
    env:
      PULUMI_STACK: ${{ needs.resolve-deployment.outputs.pulumi-stack }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/install-infra-dependencies
        with:
          infra-dir: ${{ env.INFRA_DIR }}

      - name: Set default image names
        id: defaults
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "dashboard=ghcr.io/${owner}/bovi-dashboard:${{ needs.resolve-deployment.outputs.image-tag }}" >> "$GITHUB_OUTPUT"

      - id: current-dashboard-image
        uses: ./.github/actions/resolve-current-image
        with:
          containerapp-name: bovi-dashboard-${{ env.PULUMI_STACK }}
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          default-image: ${{ steps.defaults.outputs.dashboard }}

      - uses: ./.github/actions/pulumi-up
        with:
          stack-name: ${{ env.PULUMI_STACK }}
          work-dir: ${{ env.INFRA_DIR }}
          cloud-url: azblob://pulumi-state
          pulumi-config-passphrase: ${{ secrets.PULUMI_PASSPHRASE }}
          azure-storage-account-state: ${{ secrets.AZURE_STORAGE_ACCOUNT_STATE }}
          azure-storage-key: ${{ secrets.AZURE_STORAGE_KEY }}
          storage-account-name-icar: ${{ secrets.STORAGE_ACCOUNT_NAME_ICAR }}
          storage-account-key-icar: ${{ secrets.STORAGE_ACCOUNT_KEY_ICAR }}
          storage-account-container-icar: ${{ secrets.STORAGE_ACCOUNT_CONTAINER_ICAR }}
          ghcr-username: ${{ secrets.GHCR_USERNAME }}
          ghcr-token: ${{ secrets.GHCR_TOKEN }}
          autoencoder-model-version: ${{ env.AUTOENCODER_MODEL_VERSION }}
          api-image: ${{ needs.build-api-image.outputs.image }}
          dashboard-image: ${{ steps.current-dashboard-image.outputs.image }}

      - uses: ./.github/actions/check-containerapp-health
        with:
          containerapp-name: bovi-api-${{ env.PULUMI_STACK }}
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          path: /health

  rollout-dashboard:
    needs: [resolve-deployment, detect-changes, build-dashboard-image, infra, rollout-api]
    if: |
      always() &&
      (
        needs.detect-changes.outputs.dashboard == 'true' ||
        (github.event_name == 'workflow_dispatch' && (inputs.target == 'dashboard' || inputs.target == 'all'))
      ) &&
      needs.build-dashboard-image.result == 'success' &&
      needs.infra.result == 'success' &&
      (
        !(
          needs.detect-changes.outputs.api == 'true' ||
          (github.event_name == 'workflow_dispatch' && (inputs.target == 'api' || inputs.target == 'all'))
        ) ||
        needs.rollout-api.result == 'success'
      )
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-deployment.outputs.environment }}
    env:
      PULUMI_STACK: ${{ needs.resolve-deployment.outputs.pulumi-stack }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/install-infra-dependencies
        with:
          infra-dir: ${{ env.INFRA_DIR }}

      - name: Set default image names
        id: defaults
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "api=ghcr.io/${owner}/bovi-api:${{ needs.resolve-deployment.outputs.image-tag }}" >> "$GITHUB_OUTPUT"

      - id: current-api-image
        uses: ./.github/actions/resolve-current-image
        with:
          containerapp-name: bovi-api-${{ env.PULUMI_STACK }}
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          default-image: ${{ steps.defaults.outputs.api }}

      - uses: ./.github/actions/pulumi-up
        with:
          stack-name: ${{ env.PULUMI_STACK }}
          work-dir: ${{ env.INFRA_DIR }}
          cloud-url: azblob://pulumi-state
          pulumi-config-passphrase: ${{ secrets.PULUMI_PASSPHRASE }}
          azure-storage-account-state: ${{ secrets.AZURE_STORAGE_ACCOUNT_STATE }}
          azure-storage-key: ${{ secrets.AZURE_STORAGE_KEY }}
          storage-account-name-icar: ${{ secrets.STORAGE_ACCOUNT_NAME_ICAR }}
          storage-account-key-icar: ${{ secrets.STORAGE_ACCOUNT_KEY_ICAR }}
          storage-account-container-icar: ${{ secrets.STORAGE_ACCOUNT_CONTAINER_ICAR }}
          ghcr-username: ${{ secrets.GHCR_USERNAME }}
          ghcr-token: ${{ secrets.GHCR_TOKEN }}
          autoencoder-model-version: ${{ env.AUTOENCODER_MODEL_VERSION }}
          api-image: ${{ steps.current-api-image.outputs.image }}
          dashboard-image: ${{ needs.build-dashboard-image.outputs.image }}

      - uses: ./.github/actions/check-containerapp-health
        with:
          containerapp-name: bovi-dashboard-${{ env.PULUMI_STACK }}
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          path: /
          discard-output: "true"

  deploy-lactation-curves:
    needs: [resolve-deployment, detect-changes, infra, rollout-api]
    if: |
      always() &&
      (
        needs.detect-changes.outputs.functions_curves == 'true' ||
        (github.event_name == 'workflow_dispatch' && (inputs.target == 'curves' || inputs.target == 'all'))
      ) &&
      (needs.infra.result == 'skipped' || needs.infra.result == 'success') &&
      (
        !(
          needs.detect-changes.outputs.api == 'true' ||
          (github.event_name == 'workflow_dispatch' && (inputs.target == 'api' || inputs.target == 'all'))
        ) ||
        needs.rollout-api.result == 'success'
      )
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-deployment.outputs.environment }}
    env:
      PULUMI_STACK: ${{ needs.resolve-deployment.outputs.pulumi-stack }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/install-functions-core-tools

      - uses: ./.github/actions/build-function-wheels

      - uses: ./.github/actions/prepare-curves-function-package
        with:
          app-dir: apps/backend/models/lactation-curves

      - uses: ./.github/actions/deploy-function-app
        with:
          app-dir: apps/backend/models/lactation-curves
          function-app-name: curves-${{ env.PULUMI_STACK }}
          publish-log: /tmp/curves-publish.log

      - uses: ./.github/actions/check-function-triggers
        with:
          function-app-name: curves-${{ env.PULUMI_STACK }}
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/smoke-curves-fit
        with:
          function-app-name: curves-${{ env.PULUMI_STACK }}
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-lactation-autoencoder:
    needs: [resolve-deployment, detect-changes, infra, rollout-api]
    if: |
      always() &&
      (
        needs.detect-changes.outputs.functions_autoencoder == 'true' ||
        (github.event_name == 'workflow_dispatch' && (inputs.target == 'autoencoder' || inputs.target == 'all'))
      ) &&
      (needs.infra.result == 'skipped' || needs.infra.result == 'success') &&
      (
        !(
          needs.detect-changes.outputs.api == 'true' ||
          (github.event_name == 'workflow_dispatch' && (inputs.target == 'api' || inputs.target == 'all'))
        ) ||
        needs.rollout-api.result == 'success'
      )
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-deployment.outputs.environment }}
    env:
      PULUMI_STACK: ${{ needs.resolve-deployment.outputs.pulumi-stack }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/install-functions-core-tools

      - uses: ./.github/actions/build-function-wheels

      - uses: ./.github/actions/prepare-autoencoder-function-package
        with:
          app-dir: apps/backend/models/lactation-autoencoder

      - uses: ./.github/actions/sync-autoencoder-assets
        with:
          storage-account-name-icar: ${{ secrets.STORAGE_ACCOUNT_NAME_ICAR }}
          storage-account-key-icar: ${{ secrets.STORAGE_ACCOUNT_KEY_ICAR }}
          storage-account-container-icar: ${{ secrets.STORAGE_ACCOUNT_CONTAINER_ICAR }}
          autoencoder-model-version: ${{ env.AUTOENCODER_MODEL_VERSION }}
          function-app-name: autoencoder-${{ env.PULUMI_STACK }}
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/deploy-function-app
        with:
          app-dir: apps/backend/models/lactation-autoencoder
          function-app-name: autoencoder-${{ env.PULUMI_STACK }}
          publish-log: /tmp/autoencoder-publish.log

      - uses: ./.github/actions/check-function-triggers
        with:
          function-app-name: autoencoder-${{ env.PULUMI_STACK }}
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/smoke-function-health
        with:
          function-app-name: autoencoder-${{ env.PULUMI_STACK }}
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          output-file: /tmp/autoencoder-health.json
