name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "apps/backend/**"
      - "apps/infrastructure/**"
      - "packages/infrastructure/**"
      - "packages/models/lactationcurve/src/**"
      - "packages/models/lactation-autoencoder/src/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.12"
  PULUMI_STACK: dev
  INFRA_DIR: apps/infrastructure
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/bovi-api

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      api: ${{ steps.filter.outputs.api }}
      functions: ${{ steps.filter.outputs.functions }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - "apps/infrastructure/**"
              - "packages/infrastructure/**"
            api:
              - "apps/backend/api/**"
            functions:
              - "apps/backend/models/**"
              - "packages/models/lactationcurve/src/**"
              - "packages/models/lactation-autoencoder/src/**"

  build-api-image:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: apps/backend/api
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  infra:
    needs: [detect-changes, build-api-image]
    if: |
      always() &&
      (needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.api == 'true') &&
      (needs.build-api-image.result == 'skipped' || needs.build-api-image.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install infrastructure dependencies
        working-directory: ${{ env.INFRA_DIR }}
        run: uv sync

      - name: Pulumi up
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ env.PULUMI_STACK }}
          work-dir: ${{ env.INFRA_DIR }}
          cloud-url: azblob://pulumi-state
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}

      - name: Restart Container App to pull new API image
        if: needs.detect-changes.outputs.api == 'true'
        run: |
          az containerapp revision restart \
            --name bovi-api-${{ env.PULUMI_STACK }} \
            --resource-group Bovi-Analytics-Tools \
            --revision $(az containerapp revision list \
              --name bovi-api-${{ env.PULUMI_STACK }} \
              --resource-group Bovi-Analytics-Tools \
              --query "[0].name" -o tsv)

  deploy-functions:
    needs: [detect-changes, infra]
    if: |
      always() &&
      needs.detect-changes.outputs.functions == 'true' &&
      (needs.infra.result == 'skipped' || needs.infra.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Functions Core Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y azure-functions-core-tools-4

      - name: Build lactationcurve wheel
        working-directory: packages/models/lactationcurve
        run: uv build

      - name: Generate requirements.txt for lactation-curves
        working-directory: apps/backend/models/lactation-curves
        run: uv export --no-dev --no-emit-workspace --no-hashes -o requirements.txt

      - name: Deploy lactation-curves
        working-directory: apps/backend/models/lactation-curves
        run: func azure functionapp publish "curves-${{ env.PULUMI_STACK }}" --python

      - name: Generate requirements.txt for lactation-autoencoder
        working-directory: apps/backend/models/lactation-autoencoder
        run: uv export --no-dev --no-emit-workspace --no-hashes -o requirements.txt

      - name: Deploy lactation-autoencoder
        working-directory: apps/backend/models/lactation-autoencoder
        run: func azure functionapp publish "autoencoder-${{ env.PULUMI_STACK }}" --python
