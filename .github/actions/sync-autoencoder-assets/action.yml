name: Sync lactation-autoencoder model assets
description: Sync required autoencoder model assets from ICAR Storage to the Function App storage account.

inputs:
  storage-account-name-icar:
    description: ICAR source storage account name.
    required: true
  storage-account-key-icar:
    description: ICAR source storage account key.
    required: true
  storage-account-container-icar:
    description: ICAR source storage container.
    required: true
  autoencoder-model-version:
    description: Autoencoder model version.
    required: true
  function-app-name:
    description: Destination Azure Function App name.
    required: true
  resource-group:
    description: Azure resource group.
    required: true
  subscription-id:
    description: Azure subscription ID.
    required: true
  destination-container:
    description: Destination model asset container.
    required: false
    default: model-assets

runs:
  using: composite
  steps:
    - shell: bash
      env:
        STORAGE_ACCOUNT_NAME_ICAR: ${{ inputs.storage-account-name-icar }}
        STORAGE_ACCOUNT_KEY_ICAR: ${{ inputs.storage-account-key-icar }}
        STORAGE_ACCOUNT_CONTAINER_ICAR: ${{ inputs.storage-account-container-icar }}
        AUTOENCODER_MODEL_VERSION: ${{ inputs.autoencoder-model-version }}
      run: |
        set -euo pipefail
        prefix="data/models/lactation_autoencoder/versions/${AUTOENCODER_MODEL_VERSION}"
        container="${{ inputs.destination-container }}"
        required_blobs=(
          "${prefix}/config/config.yaml"
          "${prefix}/inputs/inference/pkl/event_to_idx_dict.pkl"
          "${prefix}/inputs/inference/pkl/herd_stat_means_global.pkl"
          "${prefix}/inputs/inference/pkl/herd_stat_means_per_parity.pkl"
          "${prefix}/inputs/inference/pkl/herd_stats_means_per_herd.pkl"
          "${prefix}/inputs/inference/pkl/herd_stats_per_parity_dict.pkl"
          "${prefix}/inputs/inference/pkl/idx_to_herd_par_dict.pkl"
          "${prefix}/weights/autoencoder/saved_model.pb"
          "${prefix}/weights/autoencoder/variables/variables.index"
        )

        for var in STORAGE_ACCOUNT_NAME_ICAR STORAGE_ACCOUNT_KEY_ICAR STORAGE_ACCOUNT_CONTAINER_ICAR; do
          if [ -z "${!var:-}" ]; then
            echo "${var} is required to sync autoencoder model assets."
            exit 1
          fi
        done

        dest_connection_string="$(az functionapp config appsettings list \
          --name "${{ inputs.function-app-name }}" \
          --resource-group "${{ inputs.resource-group }}" \
          --subscription "${{ inputs.subscription-id }}" \
          --query "[?name=='AzureWebJobsStorage'].value | [0]" -o tsv)"
        if [ -z "$dest_connection_string" ]; then
          echo "AzureWebJobsStorage is not configured for ${{ inputs.function-app-name }}."
          exit 1
        fi

        echo "Ensuring ${container} exists in Function Storage."
        az storage container create \
          --connection-string "$dest_connection_string" \
          --name "$container" \
          >/dev/null

        destination_complete=true
        for blob in "${required_blobs[@]}"; do
          if [ "$(az storage blob exists \
            --connection-string "$dest_connection_string" \
            --container-name "$container" \
            --name "$blob" \
            --query exists -o tsv)" != "true" ]; then
            destination_complete=false
            break
          fi
        done
        if [ "$(az storage blob list \
          --connection-string "$dest_connection_string" \
          --container-name "$container" \
          --prefix "${prefix}/weights/autoencoder/variables/variables.data-" \
          --query "length(@)" -o tsv)" = "0" ]; then
          destination_complete=false
        fi
        if [ "$destination_complete" = "true" ]; then
          echo "Autoencoder model assets already present in Function Storage."
          exit 0
        fi

        for blob in "${required_blobs[@]}"; do
          if [ "$(az storage blob exists \
            --account-name "$STORAGE_ACCOUNT_NAME_ICAR" \
            --account-key "$STORAGE_ACCOUNT_KEY_ICAR" \
            --container-name "$STORAGE_ACCOUNT_CONTAINER_ICAR" \
            --name "$blob" \
            --query exists -o tsv)" != "true" ]; then
            echo "Required autoencoder source asset missing in ICAR Storage: ${blob}"
            exit 1
          fi
        done

        mapfile -t variable_data_blobs < <(az storage blob list \
          --account-name "$STORAGE_ACCOUNT_NAME_ICAR" \
          --account-key "$STORAGE_ACCOUNT_KEY_ICAR" \
          --container-name "$STORAGE_ACCOUNT_CONTAINER_ICAR" \
          --prefix "${prefix}/weights/autoencoder/variables/variables.data-" \
          --query "[].name" -o tsv)
        if [ "${#variable_data_blobs[@]}" -eq 0 ]; then
          echo "Required autoencoder source asset missing in ICAR Storage: variables.data-*"
          exit 1
        fi

        mapfile -t source_blobs < <(az storage blob list \
          --account-name "$STORAGE_ACCOUNT_NAME_ICAR" \
          --account-key "$STORAGE_ACCOUNT_KEY_ICAR" \
          --container-name "$STORAGE_ACCOUNT_CONTAINER_ICAR" \
          --prefix "${prefix}/" \
          --query "[?metadata.hdi_isfolder!='true'].name" -o tsv)
        if [ "${#source_blobs[@]}" -eq 0 ]; then
          echo "No autoencoder source assets found in ICAR Storage for prefix: ${prefix}/"
          exit 1
        fi

        tmp_dir="$(mktemp -d)"
        sync_blobs=("${source_blobs[@]}")
        for blob in "${sync_blobs[@]}"; do
          local_path="${tmp_dir}/${blob}"
          mkdir -p "$(dirname "$local_path")"
          az storage blob download \
            --account-name "$STORAGE_ACCOUNT_NAME_ICAR" \
            --account-key "$STORAGE_ACCOUNT_KEY_ICAR" \
            --container-name "$STORAGE_ACCOUNT_CONTAINER_ICAR" \
            --name "$blob" \
            --file "$local_path" \
            --overwrite true \
            --only-show-errors
          az storage blob upload \
            --connection-string "$dest_connection_string" \
            --container-name "$container" \
            --name "$blob" \
            --file "$local_path" \
            --overwrite true \
            --only-show-errors
        done
