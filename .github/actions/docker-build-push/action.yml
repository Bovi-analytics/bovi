name: Build and push Docker image
description: Build and push a GHCR image tagged with latest, the current commit SHA, and optional extra tags.

inputs:
  image-name:
    description: Image repository name without registry or owner.
    required: true
  context:
    description: Docker build context.
    required: true
  file:
    description: Dockerfile path. Defaults to Dockerfile inside the build context.
    required: false
    default: ""
  github-token:
    description: Token used to push to GHCR.
    required: true
  extra-tags:
    description: Additional tag names to push for this image, one per line.
    required: false
    default: ""

outputs:
  image:
    description: Commit SHA tagged image reference.
    value: ${{ steps.image.outputs.sha }}
  image-base:
    description: Base image reference without tag.
    value: ${{ steps.image.outputs.name }}

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Set image name
      id: image
      shell: bash
      run: |
        set -euo pipefail
        name="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${{ inputs.image-name }}"
        echo "name=${name}" >> "$GITHUB_OUTPUT"
        echo "sha=${name}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

    - name: Set image tags
      id: tags
      shell: bash
      env:
        IMAGE_NAME: ${{ steps.image.outputs.name }}
        EXTRA_TAGS: ${{ inputs.extra-tags }}
      run: |
        set -euo pipefail
        {
          echo "tags<<EOF"
          echo "${IMAGE_NAME}:latest"
          echo "${IMAGE_NAME}:${GITHUB_SHA}"
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            echo "${IMAGE_NAME}:${tag}"
          done <<< "$EXTRA_TAGS"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Build and push image
      id: build-push
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.file != '' && inputs.file || format('{0}/Dockerfile', inputs.context) }}
        push: true
        tags: ${{ steps.tags.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
