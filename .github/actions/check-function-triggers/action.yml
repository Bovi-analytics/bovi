name: Check Function App triggers
description: Wait until a Function App has indexed functions.

inputs:
  function-app-name:
    description: Azure Function App name.
    required: true
  resource-group:
    description: Azure resource group.
    required: true
  subscription-id:
    description: Azure subscription ID.
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        for attempt in $(seq 1 18); do
          function_count="$(az functionapp function list \
            --name "${{ inputs.function-app-name }}" \
            --resource-group "${{ inputs.resource-group }}" \
            --subscription "${{ inputs.subscription-id }}" \
            --query "length(@)" -o tsv)"
          function_count="${function_count:-0}"
          echo "${{ inputs.function-app-name }} indexed functions: ${function_count}"
          if [ "$function_count" -gt 0 ]; then
            exit 0
          fi
          sleep 10
        done
        echo "No functions indexed for ${{ inputs.function-app-name }}"
        exit 1
