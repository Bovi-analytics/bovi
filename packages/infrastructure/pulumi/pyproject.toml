[project]
name = "bovi-infrastructure"
version = "0.1.0"
description = "Infrastructure as Code for the Bovi platform — Pulumi Azure deployment"
authors = [{ name = "Douwe de Kok", email = "douwedekok@gmail.com" }]
requires-python = ">= 3.12, < 3.13"
dependencies = [
    "pulumi>=3.0.0",
    "pulumi-azure-native>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
