[project]
name = "lactation-autoencoder"
version = "0.1.0"
description = "Lactation autoencoder model — TensorFlow-based milk production time-series prediction"
authors = [{ name = "Douwe de Kok", email = "douwedekok@gmail.com" }]
requires-python = ">= 3.12, < 3.13"
dependencies = [
    "bovi-core",
    "tensorflow>=2.19.0",
    "numpy>=1.26.0",
    "mlflow[databricks]>=3.1.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lactation_autoencoder"]

[project.entry-points."bovi.models"]
autoencoder = "lactation_autoencoder.models.lactation_model:LactationAutoencoderModel"

[project.entry-points."bovi.predictors"]
autoencoder = "lactation_autoencoder.predictors.lactation_predictor:LactationPredictor"

[tool.pytest.ini_options]
pythonpath = ["src", "tests"]
testpaths = ["tests"]

[tool.semantic_release]
version_toml = ["packages/models/lactation-autoencoder/pyproject.toml:project.version"]
branch = "main"
commit_message = "chore(release): {version} [skip ci]"
commit_parser = "conventional-monorepo"
tag_format = "lactation-autoencoder-v{version}"

[tool.semantic_release.commit_parser_options]
path_filters = ["packages/models/lactation-autoencoder"]
