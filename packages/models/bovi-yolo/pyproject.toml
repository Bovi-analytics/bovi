[project]
name = "bovi-yolo"
version = "1.0.0"
description = "YOLO object detection model for dairy applications"
authors = [{ name = "Douwe de Kok", email = "douwedekok@gmail.com" }]
requires-python = ">= 3.12, < 3.13"
dependencies = [
    "bovi-core",
    "torch>=2.7.1",
    "ultralytics>=8.3.170",
    "opencv-python>=4.10.0",
    "albumentations>=2.0.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bovi_yolo"]

[project.entry-points."bovi.models"]
yolo = "bovi_yolo.models.yolo_model:YOLOModel"

[project.entry-points."bovi.predictors"]
yolo = "bovi_yolo.predictors.yolo_predictor:YOLOPredictor"

[tool.pytest.ini_options]
pythonpath = ["src", "tests"]
testpaths = ["tests"]

[tool.semantic_release]
version_toml = ["packages/models/bovi-yolo/pyproject.toml:project.version"]
branch = "main"
commit_message = "chore(release): {version} [skip ci]"
commit_parser = "conventional-monorepo"
tag_format = "bovi-yolo-v{version}"

[tool.semantic_release.commit_parser_options]
path_filters = ["packages/models/bovi-yolo"]
