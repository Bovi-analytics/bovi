[project]
name = "lactationcurve"
version = "1.0.5"
license = "MIT"
description = "Lactation curve fitting and analysis library"
readme = "README.md"
requires-python = ">= 3.12, < 3.13"
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "numpy>=2.4.0",
    "pandas>=2.3.3",
    "scipy>=1.16.3",
    "sympy>=1.14.0",
    # "matplotlib>=3.10.8",
    "requests>=2.32.5",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.1.0",
    "python-dotenv>=1.0.0",
    "pdoc>=16.0.0",
]

[project.urls]
Repository = "https://github.com/Bovi-analytics/bovi"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lactationcurve"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
markers = [
    "basic: Basic ICAR TIM calculation tests",
    "characteristic: Lactation curve characteristic extraction tests",
    "edge_cases: Edge-case and boundary-condition tests",
    "errorhandling: Error handling and validation tests",
    "fitting: Curve-fitting behavior and integration tests",
    "helpers: Helper-function tests for ISLC utilities",
    "islc_method: Core ISLC_method branch and validation tests",
    "interpolation: Interpolation function behavior tests",
    "islc: End-to-end ISLC orchestration tests",
    "islc_icar: End-to-end ISLC_ICAR orchestration tests",
    "representation: Standard representation builder tests",
]

[tool.semantic_release]
version_toml = ["packages/models/lactationcurve/pyproject.toml:project.version"]
branch = "main"
commit_message = "chore(release): {version} [skip ci]"
build_command = "bash packages/models/lactationcurve/scripts/build.sh"
commit_parser = "conventional-monorepo"
tag_format = "lactationcurve-v{version}"

[tool.semantic_release.commit_parser_options]
path_filters = ["packages/models/lactationcurve"]
