[project]
name = "lactationcurve"
version = "1.1.1"
license = "MIT"
description = "Lactation curve fitting and analysis library"
requires-python = ">= 3.12, < 3.13"
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "numpy>=2.4.0",
    "pandas>=2.3.3",
    "scipy>=1.16.3",
    "sympy>=1.14.0",
    "requests>=2.32.5",
]

[project.urls]
Repository = "https://github.com/Bovi-analytics/bovi"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lactationcurve"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
