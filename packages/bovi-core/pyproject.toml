[project]
name = "bovi-core"
version = "0.1.0"
description = "Core infrastructure for Bovi ML framework — plugin registry, base classes, and common utilities"
authors = [{ name = "Douwe de Kok", email = "douwedekok@gmail.com" }]
requires-python = ">= 3.12, < 3.13"
dependencies = [
    "pyyaml>=6.0.0",
    "python-dotenv>=1.0.0",
    "numpy>=1.26.0",
    "requests>=2.32.3",
    "azure-storage-blob>=12.26.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bovi_core"]

[tool.pytest.ini_options]
pythonpath = ["src", "tests"]
testpaths = ["tests"]
